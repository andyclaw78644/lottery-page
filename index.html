<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本神社抽籤 - 御神籤</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌸 日本神社抽籤 🌸</h1>
      <p class="subtitle">Exploring Fortune from Famous Japanese Shrines</p>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="切換深色模式">🌙 夜間</button>
    </header>

    <main>
      <div class="instruction">
        <p>先選神社，再抽取御神籤。抽完後可按「再抽一次」。</p>
      </div>

      <div class="selector-wrap">
        <label for="shrineSelect">選擇神社：</label>
        <select id="shrineSelect">
          <option value="">請選擇神社</option>
        </select>
      </div>

      <button id="drawButton">抽取御神籤</button>

      <div id="result" class="result hidden">
        <div class="shrine-badge" id="shrineBadge" aria-hidden="true">⛩️</div>
        <div class="shrine-name"></div>
        <div class="fortune-type"></div>
        <div class="fortune-slip">
          <div class="fortune-text"></div>
          <div class="fortune-translation"></div>
        </div>
        <button id="newDraw">再抽一次</button>
      </div>

      <div class="credits">
        <p>資料來源：日本神社文化語境改寫（含中文翻譯）</p>
      </div>
    </main>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
